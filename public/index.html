<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE LOTUS - WhatsApp Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #1a1a1a; color: #ffffff; }
        .container { background: #2d2d2d; padding: 2.5rem; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); text-align: center; max-width: 450px; width: 90%; border: 1px solid #444; }
        h1 { color: #ffffff; font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: 2px; text-transform: uppercase; }
        .subtitle { color: #888; margin-bottom: 2rem; font-style: italic; }
        #qr-container img { width: 250px; height: 250px; margin-top: 1rem; }
        #pairing-container { font-size: 2.5rem; font-weight: bold; color: #ffffff; margin-top: 1.5rem; letter-spacing: 8px; background: #3d3d3d; padding: 1rem; border-radius: 8px; }
        .status { margin-top: 1.5rem; font-weight: bold; color: #00ffcc; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .instructions { margin-top: 2rem; font-size: 0.9rem; color: #aaa; border-top: 1px solid #444; padding-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WHITE LOTUS</h1>
        <div class="subtitle">O Lótus Branco floresce novamente.</div>
        <div id="status" class="status">Aguardando conexão...</div>
        
        <div id="qr-container" style="display:none;">
            <p>Escaneie o QR Code abaixo:</p>
            <img id="qr-image" src="" alt="QR Code">
        </div>

        <div id="pairing-container" style="display:none;">
            <p>Seu código de emparelhamento:</p>
            <div id="pairing-code"></div>
        </div>

        <div class="instructions">
            <p id="instruction-text">Inicie o bot no Railway para gerar o acesso.</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const statusDiv = document.getElementById('status');
        const qrContainer = document.getElementById('qr-container');
        const qrImage = document.getElementById('qr-image');
        const pairingContainer = document.getElementById('pairing-container');
        const pairingCodeDiv = document.getElementById('pairing-code');
        const instructionText = document.getElementById('instruction-text');

        socket.on('qr', (url) => {
            if (url) {
                qrContainer.style.display = 'block';
                qrImage.src = url;
                pairingContainer.style.display = 'none';
                statusDiv.innerText = 'QR Code Gerado';
                instructionText.innerText = 'Abra o WhatsApp > Dispositivos Conectados > Conectar um Aparelho';
            }
        });

        socket.on('pairingCode', (code) => {
            if (code) {
                pairingContainer.style.display = 'block';
                pairingCodeDiv.innerText = code;
                qrContainer.style.display = 'none';
                statusDiv.innerText = 'Código de Emparelhamento Gerado';
                instructionText.innerText = 'Vá no WhatsApp > Dispositivos Conectados > Conectar com número de telefone';
            }
        });

        socket.on('status', (status) => {
            statusDiv.innerText = 'Status: ' + status;
            if (status === 'Conectado') {
                qrContainer.style.display = 'none';
                pairingContainer.style.display = 'none';
                instructionText.innerText = 'O bot está online e pronto para uso!';
            }
        });
    </script>
</body>
</html>
